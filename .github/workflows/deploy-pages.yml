name: Deploy to GitHub Pages

# Publishes the static PWA at the repo root to GitHub Pages. No build step — the
# dependency-free vanilla ES-module app is deployed verbatim.
#
# NOTE on branches: the `github-pages` environment is currently restricted to the
# `claude/collider-github-pages-gja0mp` branch, so that is the only branch this job can
# actually publish from. A run triggered by the `push: branches:[main]` rule below is
# REJECTED by the environment (the deploy job fails in ~1s with no steps), so it does not
# publish. Until the environment's deployment-branch rule is changed to allow `main`,
# release by running this workflow on `claude/collider-github-pages-gja0mp` via the
# `workflow_dispatch` trigger (Actions tab → Run workflow → pick that branch).

on:
  push:
    branches: [main]   # see NOTE above — only deploys once the env allows `main`
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # First run on a fresh repo: enable Pages (source "GitHub Actions") via the API.
          enablement: true

      - name: Upload repo root as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
